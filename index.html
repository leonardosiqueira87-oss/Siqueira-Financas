<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siqueira Finanças Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body class="bg-slate-50 font-sans pb-20">

    <header class="bg-[#00a859] text-white p-6 shadow-md sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight">Siqueira Finanças</h1>
            <button onclick="exportarCSV()" class="text-xs bg-white/20 px-3 py-1 rounded-full border border-white/30">Exportar Excel</button>
        </div>
    </header>

    <div class="max-w-md mx-auto px-4 mt-4 space-y-6">
        
        <section class="grid grid-cols-2 gap-3">
            <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-emerald-500">
                <p class="text-[10px] text-gray-400 uppercase font-bold">Ganhos Mês</p>
                <p id="totalEntradas" class="text-lg font-bold text-emerald-600">R$ 0,00</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-red-500">
                <p class="text-[10px] text-gray-400 uppercase font-bold">Gastos Mês</p>
                <p id="totalSaidas" class="text-lg font-bold text-red-600">R$ 0,00</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm col-span-2 flex justify-between items-center">
                <div>
                    <p class="text-[10px] text-gray-400 uppercase font-bold">Saldo Disponível</p>
                    <p id="saldoGeral" class="text-2xl font-black text-slate-800">R$ 0,00</p>
                </div>
                <div class="w-16 h-16">
                    <canvas id="miniChart"></canvas>
                </div>
            </div>
        </section>

        <section class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
            <h2 class="text-sm font-bold text-slate-700 mb-4 flex items-center gap-2">
                <span class="w-2 h-5 bg-[#00a859] rounded-full"></span> Novo Lançamento
            </h2>
            <div class="space-y-3">
                <input id="desc" type="text" placeholder="Descrição (ex: Cliente Stone)" class="w-full p-4 border rounded-2xl bg-slate-50 outline-none focus:ring-2 focus:ring-emerald-500 transition-all">
                
                <div class="flex gap-2">
                    <input id="val" type="number" inputmode="decimal" placeholder="R$ 0,00" class="w-2/3 p-4 border rounded-2xl bg-slate-50 outline-none focus:ring-2 focus:ring-emerald-500 font-bold text-lg">
                    <select id="cat" class="w-1/3 p-4 border rounded-2xl bg-slate-50 text-xs font-bold text-slate-600 outline-none">
                        <option value="Venda">Venda</option>
                        <option value="Comissão">Comissão</option>
                        <option value="Combustível">Combustível</option>
                        <option value="Alimentação">Alimentação</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4 pt-2">
                    <button onclick="add('entrada')" class="bg-emerald-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-emerald-100 active:scale-95 transition-transform">RECEBI</button>
                    <button onclick="add('saida')" class="bg-slate-800 text-white font-bold py-4 rounded-2xl shadow-lg shadow-slate-200 active:scale-95 transition-transform">PAQUEI</button>
                </div>
            </div>
        </section>

        <section class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
            <h2 class="text-sm font-bold text-slate-700 mb-4">Análise Mensal</h2>
            <canvas id="mainChart" height="150"></canvas>
        </section>

        <section class="space-y-3">
            <h2 class="text-sm font-bold text-slate-700 px-1">Últimas Movimentações</h2>
            <div id="lista" class="space-y-3"></div>
        </section>
    </div>

    <script>
        let transacoes = JSON.parse(localStorage.getItem('financas_siqueira_pro')) || [];
        let myChart;

        function atualizar() {
            const lista = document.getElementById('lista');
            lista.innerHTML = '';
            
            let ent = 0; let sai = 0;
            const mesAtual = new Date().getMonth();

            transacoes.forEach((t, i) => {
                const dataT = new Date(t.timestamp);
                if(dataT.getMonth() === mesAtual) {
                    if(t.tipo === 'entrada') ent += t.valor;
                    else sai += t.valor;
                }

                lista.innerHTML += `
                    <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-50">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full ${t.tipo==='entrada'?'bg-emerald-50 text-emerald-600':'bg-red-50 text-red-600'} flex items-center justify-center font-bold text-xs">
                                ${t.cat.substring(0,2)}
                            </div>
                            <div>
                                <p class="font-bold text-slate-800 text-sm">${t.desc}</p>
                                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter">${t.data} • ${t.cat}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-bold ${t.tipo==='entrada'?'text-emerald-600':'text-red-600'} text-sm">
                                ${t.tipo==='entrada'?'+':'-'} R$ ${t.valor.toLocaleString('pt-BR', {minimumFractionDigits:2})}
                            </p>
                            <button onclick="del(${i})" class="text-[10px] text-slate-300 font-bold">REMOVER</button>
                        </div>
                    </div>`;
            });

            document.getElementById('totalEntradas').innerText = `R$ ${ent.toLocaleString('pt-BR')}`;
            document.getElementById('totalSaidas').innerText = `R$ ${sai.toLocaleString('pt-BR')}`;
            document.getElementById('saldoGeral').innerText = `R$ ${(ent - sai).toLocaleString('pt-BR')}`;
            
            localStorage.setItem('financas_siqueira_pro', JSON.stringify(transacoes));
            renderCharts(ent, sai);
        }

        function renderCharts(ent, sai) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Entradas', 'Saídas'],
                    datasets: [{
                        data: [ent, sai],
                        backgroundColor: ['#10b981', '#1e293b'],
                        borderRadius: 10,
                        barThickness: 40
                    }]
                },
                options: { 
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, grid: { display: false } } }
                }
            });
        }

        function add(tipo) {
            const desc = document.getElementById('desc').value;
            const valor = parseFloat(document.getElementById('val').value);
            const cat = document.getElementById('cat').value;
            
            if(!desc || !valor) return alert("Preencha descrição e valor!");
            
            transacoes.unshift({ 
                desc, valor, tipo, cat, 
                timestamp: new Date().getTime(),
                data: new Date().toLocaleDateString('pt-BR') 
            });
            
            document.getElementById('desc').value = '';
            document.getElementById('val').value = '';
            atualizar();
        }

        function del(i) { if(confirm("Apagar?")) { transacoes.splice(i, 1); atualizar(); } }

        function exportarCSV() {
            let csv = "Data,Descricao,Valor,Tipo,Categoria\n";
            transacoes.forEach(t => {
                csv += `${t.data},${t.desc},${t.valor},${t.tipo},${t.cat}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', `financas_siqueira_${new Date().getMonth()+1}.csv`);
            a.click();
        }

        atualizar();
    </script>
</body>
</html>
